services:
  nexus3:
    image: sonatype/nexus3:latest@sha256:6e8905c14210c595a8177910179ce080cdc22fa3f6b660a13e6dfa1f8378a866
    #ports:
    #  - 8081:8081
    container_name: nexus
    hostname: nexus
    environment:
      - NEXUS_SECRETS_KEY_FILE=/opt/sonatype/nexus/etc/nexus.secrets.json
    volumes:
      - /srv/ops/nexus/data:/nexus-data
      - /srv/ops/nexus/config/nexus.secrets.json:/opt/sonatype/nexus/etc/nexus.secrets.json:ro
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.routers.${SERVICE_NAME}.tls.certresolver=cloudflare"
      # - "traefik.http.routers.${SERVICE_NAME}.middlewares=cloudflarewarp@file,crowdsec@file"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=8081"
      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true
