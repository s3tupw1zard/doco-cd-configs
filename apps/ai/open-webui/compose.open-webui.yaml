#      - "traefik.http.routers.${SERVICE_NAME}-terminal.tls.certresolver=cloudflare"
#      - "traefik.docker.network=traefik"

  postgres:
    image: postgres:15-alpine@sha256:09e4f20b14ddb3dfe3a0c825b206032aaf8f28300ba2070c0b60fc1c10c6abc7
    container_name: open-webui-postgres
    hostname: postgres
    restart: unless-stopped
    command: postgres -c shared_buffers=256MB -c work_mem=16MB -c maintenance_work_mem=128MB -c effective_cache_size=512MB -c max_connections=100
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_MULTIPLE_DATABASES=${POSTGRES_MULTIPLE_DATABASES}
    volumes:
      - /mnt/ai/open-webui/postgres-data:/var/lib/postgresql/data
      - /mnt/ai/open-webui/scripts/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - open-webui
    labels:
      - "traefik.enable=false"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: open-webui-qdrant
    hostname: qdrant
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
      - QDRANT__SERVICE__ENABLE_API_KEY_AUTHORIZATION=true
    restart: unless-stopped
    volumes:
      - /mnt/ai/open-webui/qdrant-data:/qdrant/storage
    networks:
      - open-webui
    labels:
      - "traefik.enable=false"

  redis:
    image: redis:alpine
    container_name: open-webui-redis
    hostname: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - /mnt/ai/open-webui/redis-data:/data
    networks:
      - open-webui
    labels:
      - "traefik.enable=false"

networks:
  open-webui:
    name: open-webui
    driver: bridge
  searxng:
  traefik:
    external: true
