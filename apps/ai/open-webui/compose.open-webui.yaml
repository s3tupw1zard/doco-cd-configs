services:

  tika:
    image: apache/tika:latest
    container_name: open-webui-tika
    networks:
      - open-webui
#    ports:
#      - "9998:9998"
    labels:
      - "traefik.enable=false"

  open-webui:
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - /mnt/ai/open-webui/open-webui-data:/app/backend/data
      - /mnt/ai/open-webui/prompt-plus/custom.css:/app/build/static/custom.css
      - /mnt/ai/open-webui/prompt-plus/loader.js:/app/build/static/loader.js
      - /mnt/ai/open-webui/prompt-plus/js/prompt-plus-app.js:/app/build/static/js/prompt-plus-app.js
    networks:
      - open-webui
      - traefik
    #ports:
    #  - ${OPEN_WEBUI_PORT-3020}:8080
    environment:
#      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_URI=http://qdrant:6333
      - VECTOR_DB=qdrant
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - ENABLE_WEBSOCKET_SUPPORT=true
      - REDIS_URL=${REDIS_URL}
      - WEBSOCKET_MANAGER=redis
      - DATABASE_POOL_SIZE=20
      - DATABASE_POOL_MAX_OVERFLOW=10
      - DATABASE_POOL_TIMEOUT=30
      - DATABASE_POOL_RECYCLE=1800
      - ENABLE_OAUTH_SIGNUP=True
      - ENABLE_OAUTH_PERSISTENT_CONFIG=True
      - OAUTH_UPDATE_PICTURE_ON_LOGIN=True
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - OPENID_PROVIDER_URL=${OPENID_PROVIDER_URL}
      - ENABLE_WEB_LOADER_SSL_VERIFICATION=false
#      - OPENID_REDIRECT_URI=
      - OAUTH_SCOPES=openid email profile groups
      - OAUTH_PROVIDER_NAME=Pocket ID
      - OAUTH_USERNAME_CLAIM=preferred_username
      - OAUTH_EMAIL_CLAIM=email
      - OAUTH_PICTURE_CLAIM=picture
      - OAUTH_GROUP_CLAIM=groups
      - ENABLE_OAUTH_ROLE_MANAGEMENT=True
      - OAUTH_ROLES_CLAIM=groups
      - OAUTH_ADMIN_ROLES=open_webui_admin
      - ENABLE_FORWARD_USER_INFO_HEADERS=True
#      - CORS_ALLOW_ORIGIN="172.18.0.0/16;172.19.0.0/16"
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`$SERVICE_DOMAIN`)"
      - "traefik.http.routers.${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=8080"
      - "traefik.http.routers.${SERVICE_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.routers.${SERVICE_NAME}.tls.certresolver=cloudflare"
      - "traefik.docker.network=traefik"

#  open-terminal:
#    image: git.${ROOT_DOMAIN}/s3tupw1zard/open-terminal:custom-full
#    container_name: open-terminal
#    hostname: open-terminal
