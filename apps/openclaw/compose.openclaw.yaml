services:
  openclaw:
    image: coollabsio/openclaw:2026.7.1
    container_name: openclaw
    hostname: openclaw
    environment:
      - TZ=Europe/Berlin
      - PUID=1000
      - PGID=1000
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENCLAW_PRIMARY_MODEL=openrouter/free
      - AUTH_USERNAME=${AUTH_USERNAME}
      - AUTH_PASSWORD=${AUTH_PASSWORD}
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN}
      - BROWSER_CDP_URL=http://openclaw-browser:9223
      - BROWSER_DEFAULT_PROFILE=openclaw
      - BROWSER_EVALUATE_ENABLED=true
      - OPENCLAW_ALLOWED_ORIGINS=${OPENCLAW_ALLOWED_ORIGINS}
      - OPENCLAW__channels__telegram__textChunkLimit=3500
      - OPENCLAW_CONFIG_JSON={"agents":{"defaults":{"model":{"primary":"openrouter/free","fallback":"google/gemini-2.5-flash"}}}}
      - HOOKS_ENABLED=true
      - HOOKS_TOKEN=${HOOKS_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_DM_POLICY=allowList
      - TELEGRAM_ALLOW_FROM=${TELEGRAM_ALLOW_FROM}
      - TELEGRAM_GROUP_POLICY=allowlist
      - TELEGRAM_GROUP_ALLOW_FROM=${TELEGRAM_GROUP_ALLOW_FROM}
      - TELEGRAM_REPLY_TO_MODE=first
      - TELEGRAM_CHUNK_MODE=length
      - TELEGRAM_TEXT_CHUNK_LIMIT=4000
      - TELEGRAM_STREAM_MODE=partial
      - TELEGRAM_LINK_PREVIEW=true
      - TELEGRAM_MEDIA_MAX_MB=5
      - TELEGRAM_REACTION_NOTIFICATIONS=own
      - TELEGRAM_REACTION_LEVEL=minimal
      - TELEGRAM_INLINE_BUTTONS=allowlist
      - TELEGRAM_ACTIONS_REACTIONS=true
      - TELEGRAM_ACTIONS_STICKER=false

    volumes:
      - /mnt/ai/openclaw/data:/data
      # Optional: custom JSON config for complex settings (groups, plugins, etc.)
      # - ./my-openclaw.json:/app/config/openclaw.json
    depends_on:
      - browser
    networks:
      - traefik
      - openclaw
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.routers.${SERVICE_NAME}.tls.certresolver=cloudflare"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=8080"
      - "traefik.docker.network=traefik"

  browser:
    image: coollabsio/openclaw-browser:0.3.0
    container_name: openclaw-browser
    hostname: openclaw-browser
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
      - CHROME_CLI=--remote-debugging-port=9222
    volumes:
      - /mnt/ai/openclaw/browser:/config
    networks:
      - openclaw
    shm_size: 2g
    restart: unless-stopped

networks:
  traefik:
    external: true
  openclaw:
