services:
  caddy:
    image: caddy:2.10.2-alpine@sha256:953131cfea8e12bfe1c631a36308e9660e4389f0c3dfb3be957044d3ac92d446
    container_name: caddy
    hostname: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${SERVICE_DOMAIN}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN}
      ACTIVITYPUB_TARGET: ${ACTIVITYPUB_TARGET}
    volumes:
      - /srv/core/ghost/caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - ghost
    networks:
      - ghost_network
      - tinybird_network

  ghost:
    # Do not alter this without updating the Tinybird Sync container as well
    image: ghost:6.53.0-alpine
    container_name: ghost
    hostname: ghost
    restart: unless-stopped
    # This is required to import current config when migrating
    env_file:
      - .env
    environment:
      NODE_ENV: production
      url: https://${SERVICE_DOMAIN}
      admin__url: https://${ADMIN_DOMAIN}
      database__client: mysql
      database__connection__host: db
      database__connection__user: ${DATABASE_USER}
      database__connection__password: ${DATABASE_PASSWORD}
      database__connection__database: ${DATABASE_NAME}
      tinybird__tracker__endpoint: https://${SERVICE_DOMAIN}/.ghost/analytics/api/v1/page_hit
      tinybird__adminToken: ${TINYBIRD_ADMIN_TOKEN}
      tinybird__workspaceId: ${TINYBIRD_WORKSPACE_ID}
      tinybird__tracker__datasource: analytics_events
      tinybird__stats__endpoint: ${TINYBIRD_API_URL}
    volumes:
      - /srv/core/ghost/data/ghost:/var/lib/ghost/content
    depends_on:
      db:
        condition: service_healthy
      tinybird-sync:
        condition: service_completed_successfully
        required: false
      tinybird-deploy:
        condition: service_completed_successfully
        required: false
      activitypub:
        condition: service_started
        required: false
    networks:
      - ghost_network

  db:
    image: mysql:8.0.44@sha256:f37951fc3753a6a22d6c7bf6978c5e5fefcf6f31814d98c582524f98eae52b21
    container_name: ghost-db
    hostname: ghost-db
    restart: unless-stopped
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DATABASE_ROOT_PASSWORD}
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME}
      MYSQL_MULTIPLE_DATABASES: ${DATABASE_NAME_ACTIVITYPUB}
    volumes:
      - /srv/core/ghost/data/mysql:/var/lib/mysql
      - /srv/core/ghost/mysql-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: mysqladmin ping -p${MYSQL_ROOT_PASSWORD} -h 127.0.0.1
      interval: 1s
      start_period: 30s
      start_interval: 10s
      retries: 120
    networks:
      - ghost_network

  traffic-analytics:
    image: ghost/traffic-analytics:1.0.294@sha256:2c6f127223ba874af6b9aca3906b6483f08bedeafa3cfaae6a8a5e1e9b920d0b
    container_name: traffic-analytics
    hostname: traffic-analytics
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - traffic_analytics_data:/data
    environment:
      NODE_ENV: production
      PROXY_TARGET: ${TINYBIRD_API_URL}/v0/events
      SALT_STORE_TYPE: ${SALT_STORE_TYPE}
      SALT_STORE_FILE_PATH: /data/salts.json
      TINYBIRD_TRACKER_TOKEN: ${TINYBIRD_TRACKER_TOKEN}
      LOG_LEVEL: debug
    profiles: [analytics]
    networks:
      - ghost_network

  activitypub:
    image: ghcr.io/tryghost/activitypub:1.2.7@sha256:f677e8af8df41418c3bfd63b4ec76b9bf2bbd85bde7da0aa9ecd86e41a230835
    container_name: activitypub
    hostname: activitypub
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - /srv/core/ghost/data/ghost:/opt/activitypub/content
    environment:
      # See https://github.com/TryGhost/ActivityPub/blob/main/docs/env-vars.md
      NODE_ENV: production
      MYSQL_HOST: db
      MYSQL_USER: ${DATABASE_USER}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD}
      MYSQL_DATABASE: ${DATABASE_NAME_ACTIVITYPUB}
      LOCAL_STORAGE_PATH: /opt/activitypub/content/images/activitypub
      LOCAL_STORAGE_HOSTING_URL: https://${DOMAIN}/content/images/activitypub
    depends_on:
      db:
        condition: service_healthy
      activitypub-migrate:
        condition: service_completed_successfully
    profiles: [activitypub]
    networks:
      - ghost_network

  # Supporting Services

  tinybird-login:
    image: ghcr.io/s3tupw1zard/ghost-tinybird:6.53.0-tinybird.20260719
    container_name: tinybird-login
    hostname: tinybird-login
    build:
      context: ./tinybird
      dockerfile: Dockerfile
    working_dir: /home/tinybird
    command: /usr/local/bin/tinybird-login
    volumes:
      - tinybird_home:/home/tinybird
      - tinybird_files:/data/tinybird
    profiles: [analytics]
    networks:
      - ghost_network
    tty: false
    restart: no

  tinybird-sync:
    # Do not alter this without updating the Ghost container as well
    image: ghost:6.53.0-alpine
    container_name: tinybird-sync
    hostname: tinybird-sync
    command: >
      sh -c "
        if [ -d /var/lib/ghost/current/core/server/data/tinybird ]; then
          rm -rf /data/tinybird/*;
          cp -rf /var/lib/ghost/current/core/server/data/tinybird/* /data/tinybird/;
          echo 'Tinybird files synced into shared volume.';
        else
          echo 'Tinybird source directory not found.';
        fi
      "
    volumes:
      - tinybird_files:/data/tinybird
    depends_on:
      tinybird-login:
        condition: service_completed_successfully
    networks:
      - ghost_network
    profiles: [analytics]
    restart: no

  tinybird-deploy:
    image: ghcr.io/s3tupw1zard/ghost-tinybird:6.53.0-tinybird.20260719
    container_name: tinybird-deploy
    hostname: tinybird-deploy
    build:
      context: ./tinybird
      dockerfile: Dockerfile
    working_dir: /data/tinybird
    command: >
      sh -c "
        tb-wrapper --cloud deploy
      "
    volumes:
      - tinybird_home:/home/tinybird
      - tinybird_files:/data/tinybird
    depends_on:
      tinybird-sync:
        condition: service_completed_successfully
    profiles: [analytics]
    networks:
      - ghost_network
    tty: true

  activitypub-migrate:
    image: ghcr.io/tryghost/activitypub-migrations:1.2.7@sha256:19724eca7b7669b01047c746738bf34c46dfa587e2be5b8641067d9ab707a7bb
    container_name: activitypub-migrate
    hostname: activitypub-migrate
    environment:
      MYSQL_DB: mysql://${DATABASE_USER}:${DATABASE_PASSWORD}@tcp(ghost-db:3306)/${DATABASE_NAME_ACTIVITYPUB}
    networks:
      - ghost_network
    depends_on:
      db:
        condition: service_healthy
    profiles: [activitypub]
    restart: no

  tinybird-local:
    image: tinybirdco/tinybird-local:beta
    container_name: tinybird-local
    hostname: tinybird-local
    # If you want to limit container resources
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: '16GB'
    # ports:
    #   - "7181:7181"
    env_file:
      - .env
    volumes:
      - clickhouse:/var/lib/clickhouse
      - redis-data:/redis-data
    networks:
      - tinybird_network


volumes:
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
  tinybird_files:
    name: tinybird_files
  tinybird_home:
    name: tinybird_home
  traffic_analytics_data:
    name: traffic_analytics_data
  clickhouse:
    name: clickhouse
  redis-data:
    name: redis-data

networks:
  ghost_network:
    name: ghost_network
  tinybird_network:
    name: tinybird_network