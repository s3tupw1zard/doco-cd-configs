services:
  mcpo:
    image: ghcr.io/open-webui/mcpo:main@sha256:1e82c9555c19e50b80745705f32b47a2647589f35279527b5118ecd3a71bd467
    container_name: mcpo
    hostname: mcpo
    volumes:
      - /srv/ai/mcpo/config:/config
      - /srv/ai/mcpo/data:/mcpo-data
      - /srv/ai/mcpo/cache:/mcpo-cache
      - /srv/ai/mcpo/userdata:/data/user
    environment:
      - BASE_DIR=/mcpo-data/docs
    command: >
      --port 8000
      --root-path "/api"
      --api-key "${MCPO_API_KEY}"
      --config /config/config.json
      --hot-reload
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`$SERVICE_DOMAIN`)"
      - "traefik.http.routers.${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=8000"
      - "traefik.http.routers.${SERVICE_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.routers.${SERVICE_NAME}.tls.certresolver=cloudflare"
      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true
