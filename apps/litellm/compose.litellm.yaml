services:
  litellm-db:
    image: postgres:15@sha256:74e110c41804365e3915fcc09d5e7a1eff50161aaa94d5da0e58e0cd75ae509c
    container_name: litellm-db
    hostname: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - /srv/ai/litellm/db:/var/lib/postgresql/data
      
      # localtime mount
      - /etc/localtime:/etc/localtime:ro
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:v1.93.0@sha256:a1745e629abfb17d434426ff48b115f54f4f4c4a0f5af241de569e93c63c411e
    container_name: litellm
    hostname: litellm
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_LOG=INFO
      - OPENAI_BASE_URL=${OPENROUTER_API_URL}
      - DATABASE_URL=${LITELLM_DB_URL}
      - STORE_MODEL_IN_DB=true
      - LITELLM_MODEL_COST_MAP_URL=https://cloudprice.net/api/v2/ai/litellm_model_prices.json
    volumes:
      - /srv/ai/litellm/data:/etc/litellm
      
      # localtime mount
      - /etc/localtime:/etc/localtime:ro
    networks:
      - default
      - traefik
    entrypoint:
      - sh
      - -c
      - |
        apk add --no-cache nodejs npm uv --quiet
        exec litellm --config /etc/litellm/config.yaml
    labels:
      - "traefik.enable=true"

      # UI /
      - "traefik.http.routers.${SERVICE_NAME}-ui.rule=Host(`${SERVICE_DOMAIN}`) && PathPrefix(`/`)"
      - "traefik.http.routers.${SERVICE_NAME}-ui.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME}-ui.tls.certresolver=cloudflare"
      - "traefik.http.routers.${SERVICE_NAME}-ui.service=${SERVICE_NAME}-ui"
      - "traefik.http.routers.${SERVICE_NAME}-ui.middlewares=${SERVICE_NAME}-ui-root"

      - "traefik.http.services.${SERVICE_NAME}-ui.loadbalancer.server.port=4000"

      - "traefik.http.middlewares.${SERVICE_NAME}-ui-root.replacepathregex.regex=^/$"
      - "traefik.http.middlewares.${SERVICE_NAME}-ui-root.replacepathregex.replacement=/ui/"

        # API /api
      - "traefik.http.routers.${SERVICE_NAME}-api.rule=Host(`${SERVICE_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${SERVICE_NAME}-api.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME}-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.${SERVICE_NAME}-api.service=${SERVICE_NAME}-api"
      # - "traefik.http.routers.${SERVICE_NAME}-api.middlewares=${SERVICE_NAME}-api-strip"

      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=4000"

      # - "traefik.http.middlewares.${SERVICE_NAME}-api-strip.stripprefix.prefixes=/api"

      # Redirect /api/v1/ui to /
      - "traefik.http.routers.${SERVICE_NAME}-ui-redirect.rule=Host(`${SERVICE_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${SERVICE_NAME}-ui-redirect.priority=100"
      - "traefik.http.routers.${SERVICE_NAME}-ui-redirect.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME}-ui-redirect.tls=true"
      - "traefik.http.routers.${SERVICE_NAME}-ui-redirect.service=${SERVICE_NAME}-ui"
      - "traefik.http.routers.${SERVICE_NAME}-ui-redirect.middlewares=redirect-api-ui-to-root@file"

      - "traefik.docker.network=traefik"

networks:
  default:
    name: litellm
  traefik:
    external: true
