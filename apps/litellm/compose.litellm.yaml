services:
  litellm-db:
    image: postgres:15@sha256:74e110c41804365e3915fcc09d5e7a1eff50161aaa94d5da0e58e0cd75ae509c
    container_name: litellm-db
    hostname: litellm-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: litellm
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: ${LITELLM_DB_PASSWORD}
    volumes:
      - /srv/ai/litellm/db:/var/lib/postgresql/data
      
      # localtime mount
      - /etc/localtime:/etc/localtime:ro
    networks:
      - default
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U litellm -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    image: ghcr.io/s3tupw1zard/litellm-custom-ui:v1.93.0@sha256:83b8fa9fdc66ee61086ca8ff1f15e666e68e36e1113e0e91a3380913afcf23df
    container_name: litellm
    hostname: litellm
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_LOG=INFO
      - OPENAI_BASE_URL=${OPENROUTER_API_URL}
      - DATABASE_URL=${LITELLM_DB_URL}
      - STORE_MODEL_IN_DB=true
      - LITELLM_MODEL_COST_MAP_URL=https://cloudprice.net/api/v2/ai/litellm_model_prices.json
      - SERVER_ROOT_PATH=/
    volumes:
      - /srv/ai/litellm/data:/etc/litellm
      
      # localtime mount
      - /etc/localtime:/etc/localtime:ro
    networks:
      - default
      - traefik
    entrypoint:
      - sh
      - -c
      - |
        exec litellm --config /etc/litellm/config.yaml
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.routers.${SERVICE_NAME}.tls.certresolver=cloudflare"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=4000"
      - "traefik.docker.network=traefik"

networks:
  default:
    name: litellm
  traefik:
    external: true
