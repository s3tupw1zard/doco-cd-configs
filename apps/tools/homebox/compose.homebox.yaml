services:
  homebox:
    image: ghcr.io/sysadminsmedia/homebox:0.25.0@sha256:6506480a3dfadd2cc885fa97b32d11b0ee28ec58629fa34a76afdb4ac540c7fc
    container_name: homebox
    hostname: homebox
    restart: unless-stopped
    environment:
      HBOX_LOG_LEVEL: "info"
      HBOX_LOG_FORMAT: "text"
      HBOX_WEB_MAX_UPLOAD_SIZE: "10"
      HBOX_OPTIONS_ALLOW_ANALYTICS: "true"
      HBOX_AUTH_RATE_LIMIT_ENABLED: "true"
      HBOX_AUTH_RATE_LIMIT_MAX_ATTEMPTS: "5"
      HBOX_AUTH_RATE_LIMIT_WINDOW: "1m"
      HBOX_AUTH_RATE_LIMIT_BASE_BACKOFF: "5m"
      HBOX_AUTH_RATE_LIMIT_MAX_BACKOFF: "1h"
      HBOX_OIDC_ENABLED: "true"
      HBOX_OIDC_ISSUER_URL: ${HBOX_OIDC_ISSUER_URL}
      HBOX_OIDC_CLIENT_ID: ${HBOX_OIDC_CLIENT_ID}
      HBOX_OIDC_CLIENT_SECRET: ${HBOX_OIDC_CLIENT_SECRET}
      HBOX_OIDC_SCOPE: "openid profile email"
      HBOX_OIDC_AUTO_REDIRECT: "false"
      HBOX_OIDC_VERIFY_EMAIL: "false"
      HBOX_OIDC_BUTTON_TEXT: "Sign in with Pocket ID"
      HBOX_MAILER_HOST: ${HBOX_MAILER_HOST}
      HBOX_MAILER_PORT: "465"
      HBOX_MAILER_USERNAME: ${HBOX_MAILER_USERNAME}
      HBOX_MAILER_PASSWORD: ${HBOX_MAILER_PASSWORD}
      HBOX_MAILER_FROM: ${HBOX_MAILER_FROM}
      HBOX_OPTIONS_ALLOW_REGISTRATION: "true"
      HBOX_OPTIONS_AUTO_INCREMENT_ASSET_ID: "true"
      HBOX_OPTIONS_ALLOW_LOCAL_LOGIN: "true"
      HBOX_OPTIONS_TRUST_PROXY: "true"
    volumes:
      - /mnt/tools/homebox/data:/data/
    networks:
      - traefik
#    ports:
#      - 3100:7745
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.routers.${SERVICE_NAME}.tls.certresolver=cloudflare"
      # - "traefik.http.routers.${SERVICE_NAME}.middlewares=cloudflarewarp@file,crowdsec@file"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=7745"
      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true