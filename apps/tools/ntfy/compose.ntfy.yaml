services:
  ntfy:
    image: binwiederhier/ntfy:v2.21.0@sha256:2b9e12d56a538f4402da51328eeca02696c4b207ab7fbe031c27e51a22ca9b86
    container_name: ntfy
    hostname: ntfy
    restart: unless-stopped
    command:
      - serve
    environment:
      TZ: "Europe/Berlin"
      NTFY_BASE_URL: ${NTFY_BASE_URL}
      NTFY_BEHIND_PROXY: "true"
      NTFY_AUTH_FILE: "/var/lib/ntfy/auth.db"
      NTFY_AUTH_DEFAULT_ACCESS: "deny-all"
      NTFY_ATTACHMENT_CACHE_DIR: "/var/lib/ntfy/attachments"
      NTFY_ATTACHMENT_FILE_SIZE_LIMIT: "20M"
      NTFY_ATTACHMENT_TOTAL_SIZE_LIMIT: "10G"
      NTFY_ATTACHMENT_EXPIRY_DURATION: "12h"
      NTFY_ENABLE_LOGIN: "true"
      NTFY_CACHE_FILE: "/var/cache/ntfy/cache.db"
      NTFY_CACHE_DURATION: "48h"
      NTFY_WEB_PUSH_PUBLIC_KEY: ${NTFY_WEB_PUSH_PUBLIC_KEY}
      NTFY_WEB_PUSH_PRIVATE_KEY: ${NTFY_WEB_PUSH_PRIVATE_KEY}
      NTFY_WEB_PUSH_FILE: "/var/lib/ntfy/webpush.db"
      NTFY_WEB_PUSH_EMAIL_ADDRESS: ${NTFY_WEB_PUSH_EMAIL_ADDRESS}
      NTFY_SMTP_SENDER_ADDR: ${NTFY_SMTP_SENDER_ADDR}
      NTFY_SMTP_SENDER_FROM: ${NTFY_SMTP_SENDER_FROM}
      NTFY_SMTP_SENDER_USER: ${NTFY_SMTP_SENDER_USER}
      NTFY_SMTP_SENDER_PASS: ${NTFY_SMTP_SENDER_PASS}
      NTFY_AUTH_USERS: ${NTFY_AUTH_USERS}
    #user: 1000:1000
    volumes:
      - /mnt/hdd/tools/ntfy/attachments:/var/lib/ntfy/attachments:rw
      - /mnt/ssd/tools/ntfy/cache:/var/cache/ntfy:rw
      - /mnt/ssd/tools/ntfy/lib/auth.db:/var/lib/ntfy/auth.db:rw
      - /mnt/ssd/tools/ntfy/lib/webpush.db:/var/lib/ntfy/webpush.db:rw
      - /mnt/ssd/tools/ntfy/config:/etc/ntfy:rw
#    ports:
#      - 80:80
    healthcheck:
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    init: true
    networks:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SERVICE_NAME}-public.rule=Host(`${SERVICE_DOMAIN}`) && (PathPrefix(`/topic1`) || PathPrefix(`/topic2`))"
      - "traefik.http.routers.${SERVICE_NAME}-public.priority=100"
      - "traefik.http.routers.${SERVICE_NAME}-public.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME}-public.service=${SERVICE_NAME}-public"
      - "traefik.http.routers.${SERVICE_NAME}-public.tls.certresolver=cloudflare"
      # - "traefik.http.routers.${SERVICE_NAME}-public.middlewares=cloudflarewarp@file,crowdsec@file"
      - "traefik.http.services.${SERVICE_NAME}-public.loadbalancer.server.port=80"

      - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.${SERVICE_NAME}.priority=10"
      - "traefik.http.routers.${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.routers.${SERVICE_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.routers.${SERVICE_NAME}.tls.certresolver=cloudflare"
      # - "traefik.http.routers.${SERVICE_NAME}.middlewares=cloudflarewarp@file,crowdsec@file,${SERVICE_NAME}-oidc"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=80"

      - traefik.http.routers.${SERVICE_NAME}-callback.rule=Host(`${SERVICE_DOMAIN}`) && PathPrefix(`/oauth2`)
      - traefik.http.routers.${SERVICE_NAME}-callback.entrypoints=websecure
      # - "traefik.http.routers.${SERVICE_NAME}-callback.middlewares=cloudflarewarp@file,crowdsec@file"
      #- traefik.http.routers.${SERVICE_NAME}-callback.service=traefik
      - traefik.http.routers.${SERVICE_NAME}-callback.tls.certresolver=cloudflare

      - "traefik.http.middlewares.${SERVICE_NAME}-oidc.plugin.oidc.enablePKCE=true"
      - "traefik.http.middlewares.${SERVICE_NAME}-oidc.plugin.oidc.providerURL=${NTFY_OIDC_ISSUER_URL}"
      - "traefik.http.middlewares.${SERVICE_NAME}-oidc.plugin.oidc.clientID=${NTFY_OIDC_CLIENT_ID}"
      - "traefik.http.middlewares.${SERVICE_NAME}-oidc.plugin.oidc.clientSecret=${NTFY_OIDC_CLIENT_SECRET}"
      - "traefik.http.middlewares.${SERVICE_NAME}-oidc.plugin.oidc.sessionEncryptionKey=${NTFY_OIDC_SESSION_ENCRYPTION_KEY}"
      - "traefik.http.middlewares.${SERVICE_NAME}-oidc.plugin.oidc.callbackURL=/oauth2/callback"
      - "traefik.http.middlewares.${SERVICE_NAME}-oidc.plugin.oidc.logoutURL=/oauth2/logout"
      - "traefik.http.middlewares.${SERVICE_NAME}-oidc.plugin.oidc.scopes=openid,profile,email,groups"

      - "traefik.docker.network=traefik"

networks:
  traefik:
    external: true
