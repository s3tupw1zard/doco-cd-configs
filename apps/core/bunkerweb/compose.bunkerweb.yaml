x-ui-env: &bw-ui-env
  # We anchor the environment variables to avoid duplication
  AUTOCONF_MODE: "yes"
  DATABASE_URI: "${BUNKERWEB_DATABASE_URI}"
  TZ: "Europe/Berlin"

x-bw-env: &bw-env
  # We use an anchor to avoid repeating the same settings for both services
  API_WHITELIST_IP: "127.0.0.0/8 10.20.30.0/24 10.0.0.0/21" # Make sure to set the correct IP range so the scheduler can send the configuration to the instance
  # Optional: set an API token and mirror it in both containers
  API_TOKEN: ""
  # Service Logs
  LOG_TYPES: "file stderr syslog"
  LOG_SYSLOG_ADDRESS: "udp://bunkerweb-syslog:514"
  # LOG_SYSLOG_TAG will be automatically set per service (override per-service if needed)
  # NGINX Logs: Send to Syslog (bunkerweb only)
  ACCESS_LOG_1: "syslog:server=bw-syslog:514,tag=bunkerweb_access"
  ERROR_LOG_1: "syslog:server=bw-syslog:514,tag=bunkerweb"

services:
  bunkerweb:
    image: bunkerity/bunkerweb:1.6.9@sha256:67e45857583378d3e0e5aaa473a4d8405da685dc143d4e43d7636b17e4646082
    container_name: bunkerweb
    hostname: bunkerweb
    ports:
      - "80:8080/tcp"
      - "443:8443/tcp"
      - "443:8443/udp" # For QUIC / HTTP3 support
    labels:
      - "bunkerweb.INSTANCE=yes" # We set the instance label to allow the autoconf to detect the instance
    volumes:
      - /mnt/hdd/core/bunkerweb/logs:/var/log/bunkerweb
    environment:
      <<: *bw-env
      LOG_SYSLOG_TAG: "bunkerweb"
      LOG_FILE_PATH: "/var/log/bunkerweb/bunkerweb.log"
      AUTOCONF_MODE: "yes"
      TZ: "Europe/Berlin"
    restart: "unless-stopped"
    networks:
      - bw-universe
      - bw-services

  bunkerweb-scheduler:
    image: bunkerity/bunkerweb-scheduler:1.6.9@sha256:2e23c66f14759c6ab69911a028278ff573a05ae826900772d2dc2398811c0926
    container_name: bunkerweb-scheduler
    hostname: bunkerweb-scheduler
    environment:
      <<: *bw-ui-env
      <<: *bw-env
      LOG_SYSLOG_TAG: "bunkerweb-scheduler"
      LOG_FILE_PATH: "/var/log/bunkerweb/bunkerweb-scheduler.log"
      BUNKERWEB_INSTANCES: "bunkerweb"
      SERVER_NAME: ""
      MULTISITE: "yes"
      USE_UI: "yes"
      UI_HOST: "http://bunkerweb-ui:7000" # Change it if needed
      USE_REDIS: "yes"
      REDIS_HOST: "bunkerweb-redis"
      SECURITY_MODE: "detect"
      USE_BACKUP=: "yes"
      BACKUP_SCHEDULE: "daily"
      BACKUP_ROTATION: "90"
      BACKUP_DIRECTORY: "/var/lib/bunkerweb/backups"
      USE_BAD_BEHAVIOR: "yes"
      BAD_BEHAVIOR_STATUS_CODES: "400 401 403 405 429 444" # Add the 404 Status code later aftrer testing
      BAD_BEHAVIOR_THRESHOLD: "20"
      BAD_BEHAVIOR_COUNT_TIME: "120"
      BAD_BEHAVIOR_BAN_TIME: "300"
      BAD_BEHAVIOR_BAN_SCOPE: "service"
      USE_BLACKLIST: "yes"
      BLACKLIST_COMMUNITY_LISTS: |
        ip:danmeuk-tor-exit
        ip:abuseipdb-ip
        ip:projecthoneypot-ip
        ip:sslbl-ip
        ip:cybercrime-trails-ip
        ua:mitchellkrogza-bad-user-agents
      USE_BROTLI: "yes"
      USE_BUNKERNET: "yes"
      BUNKERNET_SERVER: "https://api.bunkerweb.io"
      USE_CLIENT_CACHE: "yes"
      CLIENT_CACHE_EXTENSIONS: "jpg | jpeg | png | bmp | ico | svg | tif | css | js | otf | ttf | eot | woff | woff2"
      CLIENT_CACHE_CONTROL: "public, max-age=15552000"
      CLIENT_CACHE_ETAG: "yes"
      WHITELIST_COUNTRYS: "DE"
      USE_DNSBL: "yes"
      DNSBL_LISTS: |
        dnsbl:abuseipdb
        dnsbl:bl.spamcop.net
        dnsbl:bl.blocklist.de
        dnsbl:bl.mailspike.net
        dnsbl:bl.score.senderscore.com
        dnsbl:zen.spamhaus.org
      USE_GREYLIST: "no"
      # GREYLIST_IP: "10.8.0.0/21"
      # GREYLIST_ASN: "12345 67890"  # Company and partner ASNs
      # GREYLIST_USER_AGENT: "(?:\b)GoodBot(?:\b) (?:\b)PartnerCrawler(?:\b)"
      # GREYLIST_URI: "^/api/v1/"
      STRICT_TRANSPORT_SECURITY: "max-age=63072000; includeSubDomains; preload"
      #CONTENT_SECURITY_POLICY: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; object-src 'none'; form-action 'self'; frame-ancestors *;"
      #CONTENT_SECURITY_POLICY_REPORT_ONLY: "no"
      X_FRAME_OPTIONS: "SAMEORIGIN"
      X_CONTENT_TYPE_OPTIONS: "nosniff"
      X_DNS_PREFETCH_CONTROL: "off"
      REFERRER_POLICY: "strict-origin-when-cross-origin"
      KEEP_UPSTREAM_HEADERS: "Permissions-Policy X-Frame-Options X-Forwarded-For X-Real-IP X-Forwarded-Proto X-Forwarded-Host"
      AUTO_LETS_ENCRYPT: "yes"
      EMAIL_LETS_ENCRYPT: ${EMAIL_LETS_ENCRYPT}
      LETS_ENCRYPT_SERVER: "letsencrypt"
      LETS_ENCRYPT_CHALLENGE: "dns"
      LETS_ENCRYPT_DNS_PROVIDER: "cloudflare"
      LETS_ENCRYPT_DNS_PROPAGATION: "30"
      LETS_ENCRYPT_DNS_CREDENTIAL_ITEM: ${LETS_ENCRYPT_DNS_CREDENTIAL_ITEM}
      USE_LETS_ENCRYPT_WILDCARD: "yes"
      USE_LETS_ENCRYPT_STAGING: "no"
      LETS_ENCRYPT_CLEAR_OLD_CERTS: "yes"
      LETS_ENCRYPT_MAX_RETRIES: "1" # Set low for testing, increase it later
      USE_LIMIT_REQ: "yes"
      LIMIT_REQ_URL: "/"
      LIMIT_REQ_RATE: "10r/s"
      USE_LIMIT_CONN: "yes"
      LIMIT_CONN_MAX_HTTP1: "10"
      LIMIT_CONN_MAX_HTTP2: "100"
      LIMIT_CONN_MAX_HTTP3: "100"
      LIMIT_CONN_MAX_STREAM: "10"
      USE_METRICS: "yes"
      METRICS_MEMORY_SIZE: "16mb"
      METRICS_MAX_BLOCKED_REQUESTS: "1000"
      METRICS_MAX_BLOCKED_REQUESTS_REDIS: "100000"
      METRICS_SAVE_TO_REDIS: "yes"
      DISABLE_DEFAULT_SERVER: "yes"
      DISABLE_DEFAULT_SERVER_STRICT_SNI: "yes"
      DENY_HTTP_STATUS: "444"
      ALLOWED_METHODS: "GET|POST|PUT|DELETE"
      MAX_CLIENT_SIZE: "5m"
      HTTP2: "yes"
      HTTP3: "yes"
      HTTP3_ALT_SVC_PORT: "443"
      # Maybe better to configure per app
      USE_MODSECURITY: "yes"
      USE_MODSECURITY_CRS: "yes"
      MODSECURITY_CRS_VERSION: "4"
      MODSECURITY_SEC_RULE_ENGINE: "On"
      MODSECURITY_SEC_AUDIT_ENGINE: "RelevantOnly"
      MODSECURITY_SEC_AUDIT_LOG_PARTS: "ABIJDEFHZ"
      MODSECURITY_REQ_BODY_NO_FILES_LIMIT: "131072"
      USE_MODSECURITY_CRS_PLUGINS: "yes"
      # MODSECURITY_CRS_PLUGINS: "some-plugin"
      USE_REVERSE_SCAN: "yes"
      REVERSE_SCAN_PORTS: "22 80 443 3128 8000 8080"
      REVERSE_SCAN_TIMEOUT: "500"
      USE_SECURITYTXT: "yes"
      SECURITYTXT_URI: "/.well-known/security.txt"
      SECURITYTXT_CONTACT: ${SECURITYTXT_CONTACT}
      SECURITYTXT_EXPIRES: "2025-12-31"
      SECURITYTXT_PREFERRED_LANG: "en"
      SECURITYTXT_CANONICAL: "https://${ROOT_DOMAIN}/.well-known/security.txt"
      SECURITYTXT_POLICY: "https://${ROOT_DOMAIN}/security-policy.html"
      SESSIONS_SECRET: "${BUNKERWEB_SESSIONS_SECRET}"
      SESSIONS_NAME: "bunkerweb_session"
      SESSIONS_IDLING_TIMEOUT: "3600"
      SESSIONS_ROLLING_TIMEOUT: "7200"
      SESSIONS_ABSOLUTE_TIMEOUT: "86400"
      SESSIONS_CHECK_IP: "yes"
      SESSIONS_CHECK_USER_AGENT: "yes"
      REDIRECT_HTTP_TO_HTTPS: "yes"
      AUTO_REDIRECT_HTTP_TO_HTTPS: "yes"
      SSL_PROTOCOLS: "TLSv1.2 TLSv1.3"
      SSL_CIPHERS_LEVEL: "modern"
      SSL_SESSION_CACHE_SIZE: "10m"
      USE_REAL_IP: "yes"
      REAL_IP_HEADER: "X-FORWARDED-FOR"
      REAL_IP_RECURSIVE: "yes"
      REAL_IP_FROM: "100.95.53.54 100.109.92.13 172.18.0.0/16"
      REAL_IP_FROM_URLS: "https://www.cloudflare.com/ips-v4/ https://www.cloudflare.com/ips-v6/"
      USE_ANTIBOT: "turnstile"
      ANTIBOT_TURNSTILE_SITEKEY: "${ANTIBOT_TURNSTILE_SITEKEY}"
      ANTIBOT_TURNSTILE_SECRET: "${ANTIBOT_TURNSTILE_SECRET}"
      ANTIBOT_URI: "/challenge"
      ANTIBOT_TIME_RESOLVE: "60"
      ANTIBOT_TIME_VALID: "86400"
    volumes:
      - /mnt/ssd/core/bunkerweb/storage:/data # This is used to persist the cache and other data
      - /mnt/hdd/core/bunkerweb/backups:/var/lib/bunkerweb/backups # This is used to persist the backups
    restart: "unless-stopped"
    networks:
      - bw-universe
      - bw-db

  bunkerweb-autoconf:
    image: bunkerity/bunkerweb-autoconf:1.6.9@sha256:ed26a72999b8e7b5c8fe21394d97a30cb8a5d191ec6110ea187c5d598a8840d8
    container_name: bunkerweb-autoconf
    hostname: bunkerweb-autoconf
    depends_on:
      - bunkerweb-docker
    environment:
      <<: *bw-ui-env
      <<: *bw-env
      LOG_SYSLOG_TAG: "bunkerweb-autoconf"
      LOG_FILE_PATH: "/var/log/bunkerweb/bunkerweb-autoconf.log"
      DOCKER_HOST: "tcp://bunkerweb-docker:2375"
    restart: "unless-stopped"
    networks:
      - bw-universe
      - bw-docker
      - bw-db

  bunkerweb-docker:
    image: tecnativa/docker-socket-proxy:nightly@sha256:37ada773f5d32a05bcac17a5aa1335bbaf4bdd96ae20a342b02f678a156d389f
    container_name: bunkerweb-docker
    hostname: bunkerweb-docker
    restart: "unless-stopped"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      CONTAINERS: "1"
      LOG_LEVEL: "warning"
    networks:
      - bw-docker

  bunkerweb-ui:
    image: bunkerity/bunkerweb-ui:1.6.9@sha256:447ef5c0e8215e36262b2cf072934b23f7e19d77e1520343a94244c80dafb79a
    container_name: bunkerweb-ui
    hostname: bunkerweb-ui
    environment:
      <<: *bw-ui-env
      <<: *bw-env
      LOG_SYSLOG_TAG: "bunkerweb-ui"
      LOG_FILE_PATH: "/var/log/bunkerweb/bunkerweb-ui.log"
      SERVER_NAME: ${SERVICE_DOMAIN}
      TOTP_ENCRYPTION_KEYS: "${TOTP_ENCRYPTION_KEYS}"
    restart: "unless-stopped"
    networks:
      - bw-universe
      - bw-db
    labels:
      - "bunkerweb.SERVER_NAME=${SERVICE_DOMAIN}"
      - "bunkerweb.USE_REVERSE_PROXY=yes"
      - "bunkerweb.REVERSE_PROXY_HOST=http://bunkerweb-ui:7000"
      - "bunkerweb.USE_CORS=no"
      - "bunkerweb.USE_TEMPLATE=ui"
      - "bunkerweb.SECURITY_MODE=block"
      - "bunkerweb.USE_LIMIT_REQ=yes"
      - "bunkerweb.LIMIT_REQ_URL=/"
      - "bunkerweb.LIMIT_REQ_RATE=5r/s"
      - "bunkerweb.BAD_BEHAVIOR_THRESHOLD=20"
      - "bunkerweb.WHITELIST_IP=127.0.0.1 10.20.30.0/24 10.8.0.0/21"
      - "bunkerweb.USE_COUNTRY_BLOCK=no"
      - "bunkerweb.USE_ANTIBOT=no"
      - "bunkerweb.MODSECURITY_SEC_RULE_ENGINE=OnDetectionOnly"
      # - "bunkerweb.REVERSE_PROXY_URL=/${BWUI_PROXY_URL}/"
  bunkerweb-db:
    image: mariadb:12@sha256:e16f61b8f6ed25111adbb1c5c19bbc2904efc8ed14029999af0cbe1c7ae18bf1
    container_name: bunkerweb-db
    hostname: bunkerweb-db
    # We set the max allowed packet size to avoid issues with large queries
    command: >
      --max-allowed-packet=67108864
      --wait_timeout=300
      --interactive_timeout=300
      --net_read_timeout=60
      --net_write_timeout=60
      --skip_ssl
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: "db"
      MYSQL_USER: "bunkerweb"
      MYSQL_PASSWORD: "${BUNKERWEB_DB_PASSWORD}" # Remember to set a stronger password for the database
    volumes:
      - /mnt/ssd/core/bunkerweb/db-data:/var/lib/mysql
    restart: "unless-stopped"
    networks:
      - bw-db

  bunkerweb-redis: # Redis service for the persistence of reports/bans/stats
    image: redis:8-alpine@sha256:81b6f81d6a6c5b9019231a2e8eb10085e3a139a34f833dcc965a8a959b040b72
    container_name: bunkerweb-redis
    hostname: bunkerweb-redis
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1000
      --appendonly yes
    volumes:
      - /mnt/ssd/core/bunkerweb/redis-data:/data
    restart: "unless-stopped"
    networks:
      - bw-universe

  bunkerweb-syslog:
    image: balabit/syslog-ng:4.10.2
    container_name: bunkerweb-syslog
    hostname: bunkerweb-syslog
    cap_add:
      - NET_BIND_SERVICE  # Bind to low ports
      - NET_BROADCAST  # Send broadcasts
      - NET_RAW  # Use raw sockets
      - DAC_READ_SEARCH  # Read files bypassing permissions
      - DAC_OVERRIDE  # Override file permissions
      - CHOWN  # Change ownership
      - SYSLOG  # Write to system logs
    volumes:
      - /mnt/ssd/core/bunkerweb/syslog-ng/logs/bunkerweb:/var/log/bunkerweb # This is the volume used to store the logs
      - /mnt/ssd/core/bunkerweb/syslog-ng/config/syslog-ng.conf:/etc/syslog-ng/syslog-ng.conf # This is the syslog-ng configuration file
    restart: "unless-stopped"
    networks:
      - bw-universe

networks:
  bw-universe:
    name: bw-universe
    external: true
  bw-services:
    external: true
    name: bw-services
  bw-docker:
    external: true
    name: bw-docker
  bw-db:
    external: true
    name: bw-db