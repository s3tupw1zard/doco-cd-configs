#    environment:
#      - OPEN_TERMINAL_API_KEY=${OPEN_TERMINAL_API_KEY}
#      - HOME=/home
#      - OPEN_TERMINAL_MULTI_USER=true
#    networks:
#      - traefik
#    labels:
#      - "traefik.enable=true"
#      - "traefik.http.routers.${SERVICE_NAME}-terminal.rule=Host(`terminal.$SERVICE_DOMAIN`)"
#      - "traefik.http.routers.${SERVICE_NAME}-terminal.entrypoints=websecure"
#      - "traefik.http.services.${SERVICE_NAME}-terminal.loadbalancer.server.port=8000"
#      - "traefik.http.routers.${SERVICE_NAME}-terminal.service=${SERVICE_NAME}-terminal"
#      - "traefik.http.routers.${SERVICE_NAME}-terminal.tls.certresolver=cloudflare"
#      - "traefik.docker.network=traefik"

  postgres:
    image: postgres:15-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
    container_name: open-webui-postgres
    hostname: postgres
    restart: unless-stopped
    command: postgres -c shared_buffers=256MB -c work_mem=16MB -c maintenance_work_mem=128MB -c effective_cache_size=512MB -c max_connections=100
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_MULTIPLE_DATABASES=${POSTGRES_MULTIPLE_DATABASES}
    volumes:
      - /srv/ai/open-webui/postgres-data:/var/lib/postgresql/data
      - /srv/ai/open-webui/scripts/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - open-webui
    labels:
      - "traefik.enable=false"

  qdrant:
    image: qdrant/qdrant:latest@sha256:0bd98fa7977f1e75694779359ca4e212822e5a71334e28421182f72f209d5286
    container_name: open-webui-qdrant
    hostname: qdrant
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
      - QDRANT__SERVICE__ENABLE_API_KEY_AUTHORIZATION=true
    restart: unless-stopped
    volumes:
      - /srv/ai/open-webui/qdrant-data:/qdrant/storage
    networks:
      - open-webui
    labels:
      - "traefik.enable=false"

  redis:
    image: redis:alpine@sha256:9d317178eceac8454a2284a9e6df2466b93c745529947f0cd42a0fa9609d7005
    container_name: open-webui-redis
    hostname: redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - /srv/ai/open-webui/redis-data:/data
    networks:
      - open-webui
    labels:
      - "traefik.enable=false"

networks:
  open-webui:
    name: open-webui
    driver: bridge
  searxng:
  traefik:
    external: true
