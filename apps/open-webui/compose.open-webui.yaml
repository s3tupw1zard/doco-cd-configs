services:
  computer:
    image: ghcr.io/open-webui/computer:0.9.9-browser@sha256:5350a6198866ec4c2eed915baa5dc3fbf49d66c2981f8912b94d994874b1dbcf
    container_name: open-webui-computer
    hostname: open-webui-computer
    #ports:
    #  - 8000:8000
    volumes:
      - /srv/ai/open-webui/computer/data:/data
      - /srv/ai/open-webui/computer/workspace:/workspace
    working_dir: /workspace
    networks:
      - open-webui
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.computer-${SERVICE_NAME}.rule=Host(`computer.${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.computer-${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.services.computer-${SERVICE_NAME}.loadbalancer.server.port=8000"
      - "traefik.http.routers.computer-${SERVICE_NAME}.service=computer-${SERVICE_NAME}"
      - "traefik.http.routers.computer-${SERVICE_NAME}.tls.certresolver=cloudflare"
      - "traefik.docker.network=traefik"

  tika:
    image: apache/tika:latest@sha256:90b7fa1dc018434075fce9e1d9b88b1e3d0ea6979d0cf86e116c79a8073ae973
    container_name: open-webui-tika
    networks:
      - open-webui
#    ports:
#      - "9998:9998"
    labels:
      - "traefik.enable=false"

  openai-edge-tts:
    container_name: openai-edge-tts
    image: travisvn/openai-edge-tts:latest@sha256:8ac4b5bc904d34f3f3b90e5836bb14e51b71bed84dc1f668a8791ffa046d2904
    #ports:
    #  - 5050:5050
    environment:
      - API_KEY=${EDGE_TTS_API_KEY}
    restart: unless-stopped
    networks:
      - open-webui
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.edgetts-${SERVICE_NAME}.rule=Host(`edgetts.${SERVICE_DOMAIN}`)"
      - "traefik.http.routers.edgetts-${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.services.edgetts-${SERVICE_NAME}.loadbalancer.server.port=5050"
      - "traefik.http.routers.edgetts-${SERVICE_NAME}.service=edgetts-${SERVICE_NAME}"
      - "traefik.http.routers.edgetts-${SERVICE_NAME}.tls.certresolver=cloudflare"
      - "traefik.docker.network=traefik"

  open-webui:
    image: ghcr.io/open-webui/open-webui:main@sha256:a26effeb220e132482bf7e0560b3404843e7bc40d23051144e062960df8df6b0
    container_name: open-webui
    volumes:
      - /srv/ai/open-webui/open-webui-data:/app/backend/data
      #- /srv/ai/open-webui/prompt-plus/custom.css:/app/build/static/custom.css
      #- /srv/ai/open-webui/prompt-plus/loader.js:/app/build/static/loader.js
      #- /srv/ai/open-webui/prompt-plus/js/prompt-plus-app.js:/app/build/static/js/prompt-plus-app.js
    networks:
      - open-webui
      - traefik
    #ports:
    #  - ${OPEN_WEBUI_PORT-3020}:8080
    environment:
#      - OLLAMA_BASE_URL=http://ollama:11434
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}
      - OPENAI_API_BASE_URL=${OPENAI_API_BASE_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - QDRANT_URI=http://qdrant:6333
      - VECTOR_DB=qdrant
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - ENABLE_WEBSOCKET_SUPPORT=true
      - REDIS_URL=${REDIS_URL}
      - WEBSOCKET_MANAGER=redis
      - DATABASE_POOL_SIZE=20
      - DATABASE_POOL_MAX_OVERFLOW=10
      - DATABASE_POOL_TIMEOUT=30
      - DATABASE_POOL_RECYCLE=1800
      - ENABLE_OAUTH_SIGNUP=True
      - ENABLE_OAUTH_PERSISTENT_CONFIG=True
      - OAUTH_UPDATE_PICTURE_ON_LOGIN=True
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - OPENID_PROVIDER_URL=${OPENID_PROVIDER_URL}
      - ENABLE_WEB_LOADER_SSL_VERIFICATION=false
#      - OPENID_REDIRECT_URI=
      - OAUTH_SCOPES=openid email profile groups
      - OAUTH_PROVIDER_NAME=Pocket ID
      - OAUTH_USERNAME_CLAIM=preferred_username
      - OAUTH_EMAIL_CLAIM=email
      - OAUTH_PICTURE_CLAIM=picture
      - OAUTH_GROUP_CLAIM=groups
      - ENABLE_OAUTH_ROLE_MANAGEMENT=True
      - OAUTH_ROLES_CLAIM=groups
      - OAUTH_ADMIN_ROLES=open_webui_admin
      - ENABLE_FORWARD_USER_INFO_HEADERS=True
#      - CORS_ALLOW_ORIGIN="172.18.0.0/16;172.19.0.0/16"
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${SERVICE_NAME}.rule=Host(`$SERVICE_DOMAIN`)"
      - "traefik.http.routers.${SERVICE_NAME}.entrypoints=websecure"
      - "traefik.http.services.${SERVICE_NAME}.loadbalancer.server.port=8080"
      - "traefik.http.routers.${SERVICE_NAME}.service=${SERVICE_NAME}"
      - "traefik.http.routers.${SERVICE_NAME}.tls.certresolver=cloudflare"
      - "traefik.docker.network=traefik"

#  open-terminal:
#    image: git.${ROOT_DOMAIN}/s3tupw1zard/open-terminal:custom-full
#    container_name: open-terminal
#    hostname: open-terminal
#    restart: unless-stopped
